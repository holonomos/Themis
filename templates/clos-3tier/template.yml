name: clos-3tier
display_name: "3-Tier Clos (Border + Spine + Leaf + Server)"

parameters:
  border_count:
    type: integer
    default: 2
    min: 1
    max: 4
  spine_count:
    type: integer
    default: 2
    min: 1
    max: 4
  rack_count:
    type: integer
    default: 4
    min: 1
    max: 8
  servers_per_rack:
    type: integer
    default: 4
    min: 1
    max: 8

fixed:
  leafs_per_rack: 2
  control_plane_nodes:
    - { name: bastion,      role: bastion,      mgmt_ip: "192.168.0.2" }
    - { name: services,     role: services,     mgmt_ip: "192.168.0.3" }
    - { name: orchestrator, role: orchestrator, mgmt_ip: "192.168.0.4" }
    - { name: telemetry,    role: telemetry,    mgmt_ip: "192.168.0.5" }
    - { name: registry,     role: registry,     mgmt_ip: "192.168.0.6" }

addressing:
  loopback_cidr: "10.0.0.0/16"
  fabric_p2p_cidr: "172.16.0.0/16"
  mgmt_cidr: "192.168.0.0/24"
  mgmt_gateway: "192.168.0.1"
  mgmt_bridge: "br-mgmt-<project-name>"
  data_cidr: "10.100.0.0/30"
  data_gateway: "10.100.0.1"
  data_bridge: "br-data-<project-name>"

asn:
  border: 65000
  spine_base: 65001
  leaf_base: 65101
