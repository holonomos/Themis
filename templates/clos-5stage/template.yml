name: clos-5stage
display_name: "5-Stage Clos (Pod-based: Border + Super-Spine + Spine + Leaf + Server)"

parameters:
  super_spine_count:
    type: integer
    default: 2
    min: 1
    max: 4
  pod_count:
    type: integer
    default: 2
    min: 1
    max: 4
  spines_per_pod:
    type: integer
    default: 2
    min: 1
    max: 4
  racks_per_pod:
    type: integer
    default: 2
    min: 1
    max: 4
  servers_per_rack:
    type: integer
    default: 2
    min: 1
    max: 4

fixed:
  border_count: 2
  leafs_per_rack: 2
  control_plane_nodes:
    - { name: mgmt,      role: mgmt,      mgmt_ip: "192.168.0.1" }
    - { name: bastion,   role: bastion,   mgmt_ip: "192.168.0.2" }
    - { name: ops,       role: ops,       mgmt_ip: "192.168.0.3" }
    - { name: obs,       role: obs,       mgmt_ip: "192.168.0.4" }
    - { name: artifacts, role: artifacts, mgmt_ip: "192.168.0.5" }

addressing:
  loopback_cidr: "10.0.0.0/16"
  fabric_p2p_cidr: "172.16.0.0/16"
  mgmt_cidr: "192.168.0.0/24"
  mgmt_gateway: "192.168.0.1"
  mgmt_bridge: "br-mgmt-<project-name>"
  data_cidr: "10.100.0.0/30"
  data_gateway: "10.100.0.1"
  data_bridge: "br-data-<project-name>"

asn:
  border: 65000
  super_spine_base: 65001
  spine_base: 65100
  leaf_base: 65200
