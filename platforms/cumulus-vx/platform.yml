name: cumulus-vx
display_name: "Cumulus VX (NVUE)"
base_os: debian
base_os_version: "11"
nos: nvue

versions:
  cumulus_linux: "5.9"
  frr: "8.4"           # bundled with Cumulus 5.9, not separately installed
  node_exporter: "1.7.0"
  frr_exporter: "1.10.1"
  prometheus: "2.47.0"
  grafana: "10.0.3"
  loki: "2.9.3"
  promtail: "2.9.3"

resource_profiles:
  border:  { vcpu: 1, memory_mb: 768,  disk_gb: 6  }
  spine:   { vcpu: 1, memory_mb: 768,  disk_gb: 6  }
  leaf:    { vcpu: 1, memory_mb: 768,  disk_gb: 6  }
  server:  { vcpu: 1, memory_mb: 768,  disk_gb: 5  }
  bastion:      { vcpu: 1, memory_mb: 256,  disk_gb: 3  }
  services:     { vcpu: 1, memory_mb: 512,  disk_gb: 5  }
  orchestrator: { vcpu: 1, memory_mb: 256,  disk_gb: 3  }
  telemetry:    { vcpu: 2, memory_mb: 2048, disk_gb: 10 }
  registry:     { vcpu: 1, memory_mb: 512,  disk_gb: 20 }

ksm:
  base_mb: 400
  incremental_mb: 120

nos_driver:
  config_path: /etc/nvue.d/startup.yaml
  reload_command: "nv config apply --assume-yes startup"
  verify_command: "nv show router bgp neighbor"
  main_template: nvue.yaml.j2
  additional_files: []
