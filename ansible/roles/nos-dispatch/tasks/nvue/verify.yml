---
- name: "Verify NOS — run platform verify_command"
  command: "{{ verify_command }}"
  register: nos_verify_out
  changed_when: false
  ignore_errors: yes

- name: "Show verify output"
  debug:
    var: nos_verify_out.stdout_lines

- name: "Assert verify succeeded"
  assert:
    that: nos_verify_out.rc == 0
    fail_msg: "verify_command '{{ verify_command }}' exited with rc={{ nos_verify_out.rc }}"
