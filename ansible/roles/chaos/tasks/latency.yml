---
- name: Determine bridge name
  set_fact:
    bridge: "{{ (all_links | selectattr('a', 'in', [node_a, node_b]) | selectattr('b', 'in', [node_a, node_b]) | first).bridge }}"

- name: Get veths attached to bridge
  shell: "ip link show master {{ bridge }} | grep -oP '^[0-9]+: \\K[^:@]+'"
  register: veths_out
  changed_when: false

- name: Remove existing qdisc
  command: "tc qdisc del dev {{ item }} root"
  loop: "{{ veths_out.stdout_lines }}"
  ignore_errors: yes

- name: Apply latency to veths
  command: "tc qdisc add dev {{ item }} root netem delay {{ delay_ms }}ms"
  loop: "{{ veths_out.stdout_lines }}"
