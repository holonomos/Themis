---
- set_fact:
    rack_id: "{{ rack | regex_replace('^rack-', '') }}"

- set_fact:
    leafs:
      - "leaf-{{ rack_id }}a"
      - "leaf-{{ rack_id }}b"

- set_fact:
    rack_links: >-
      {{
        (all_links | selectattr('a', 'match', '^spine-') | selectattr('b', 'in', leafs) | map(attribute='bridge') | list) +
        (all_links | selectattr('b', 'match', '^spine-') | selectattr('a', 'in', leafs) | map(attribute='bridge') | list)
      }}

- name: Set rack partition state
  command: "ip link set {{ item }} {{ 'up' if restore|default(false) else 'down' }}"
  loop: "{{ rack_links }}"
