---
- name: Determine bridge name
  set_fact:
    bridge: "{{ (all_links | selectattr('source', 'in', [node_a, node_b]) | selectattr('target', 'in', [node_a, node_b]) | first).bridge }}"

- name: Get veths attached to bridge
  shell: "ip link show master {{ bridge }} | grep -oP '^[0-9]+: \\K[^:@]+'"
  register: veths_out
  changed_when: false

- name: Remove existing qdisc
  command: "tc qdisc del dev {{ item }} root"
  loop: "{{ veths_out.stdout_lines }}"
  ignore_errors: yes

- name: Apply packet loss to veths
  command: "tc qdisc add dev {{ item }} root netem loss {{ loss_pct }}%"
  loop: "{{ veths_out.stdout_lines }}"
