---
- name: Install dnsmasq
  dnf:
    name: dnsmasq
    state: present

- name: Disable systemd-resolved (binds :53 and conflicts with dnsmasq)
  systemd:
    name: systemd-resolved
    state: stopped
    enabled: no
  failed_when: false

- name: Render dnsmasq configuration
  template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart dnsmasq

- name: Point /etc/resolv.conf at dnsmasq locally
  copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 127.0.0.1
      search {{ domain }}
    owner: root
    group: root
    mode: '0644'

- name: Enable and start dnsmasq
  systemd:
    name: dnsmasq
    state: started
    enabled: yes
