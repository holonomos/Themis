---
- name: "Build cloud-init seed ISO for {{ vm_name }}"
  command:
    cmd: >-
      cloud-localds -v
      --network-config={{ generator_output_dir }}/seeds/{{ vm_name }}/network-config
      {{ seed_image_dir }}/{{ vm_name }}-seed.iso
      {{ generator_output_dir }}/seeds/{{ vm_name }}/user-data
      {{ generator_output_dir }}/seeds/{{ vm_name }}/meta-data
    creates: "{{ seed_image_dir }}/{{ vm_name }}-seed.iso"
