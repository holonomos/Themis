---
- name: Ensure seed-image directory exists
  file:
    path: "{{ seed_image_dir }}"
    state: directory
    mode: '0755'

- name: Build cloud-init seed ISOs for seed-mode VMs
  include_tasks: build-seed.yml
  loop: "{{ groups['all'] }}"
  when:
    - item != 'localhost'
    - hostvars[item].bootstrap is defined
    - hostvars[item].bootstrap.mode == 'seed'
  vars:
    vm_name: "{{ item }}"
