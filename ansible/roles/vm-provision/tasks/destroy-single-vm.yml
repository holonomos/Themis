---
- name: Destroy domain
  community.libvirt.virt:
    command: destroy
    name: "{{ vm_name }}"
  ignore_errors: yes

- name: Undefine domain
  community.libvirt.virt:
    command: undefine
    name: "{{ vm_name }}"
  ignore_errors: yes

- name: Delete CoW volume
  file:
    path: "/var/lib/libvirt/images/{{ vm_name }}.qcow2"
    state: absent
