---
- name: Prepare base image in libvirt pool
  hosts: hypervisor
  gather_facts: no
  become: yes
  roles:
    - role: vm-provision
      tasks_from: prepare-base-image

- name: Create L1 fabric
  hosts: hypervisor
  gather_facts: no
  become: yes
  roles:
    - role: l1-fabric
      tasks_from: create

- name: Provision all VMs
  hosts: hypervisor
  gather_facts: no
  become: yes
  roles:
    - role: vm-provision
      tasks_from: create-vm

- name: Wait for all VMs to become reachable
  hosts: all:!hypervisor
  gather_facts: no
  tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 300
        sleep: 5

- name: Configure control plane
  hosts: control_plane
  become: yes
  roles:
    - control-plane

- name: Push NOS configuration to fabric nodes
  hosts: fabric_nodes
  become: yes
  roles:
    - nos-dispatch
    - observability

